{% extends "base.html" %} {% block title %}로그인 - IoT 기반 재고 조사/재고 관리
SW{% endblock %} {% block content %}
<div class="login-shell">
  <div class="login-card">
    <p class="eyebrow mb-2">Raspberry Pi Inventory Portal</p>
    <h1 class="h3 mb-2">로그인</h1>
    <p class="text-muted mb-4">admin 또는 staff 계정으로 접속하세요.</p>

    <form method="post" class="stack-form">
      <input
        type="hidden"
        name="next"
        value="{{ request.args.get('next', '') }}"
      />
      <div>
        <label class="form-label" for="username">아이디</label>
        <input
          class="form-control form-control-lg"
          id="username"
          name="username"
          autocomplete="username"
          required
        />
      </div>
      <div>
        <label class="form-label" for="password">비밀번호</label>
        <input
          class="form-control form-control-lg"
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
        />
      </div>
      <button class="btn btn-primary btn-lg touch-button" type="submit">
        로그인
      </button>
    </form>

    <div class="login-help mt-4">
      <div><strong>admin</strong> / admin123</div>
      <div><strong>staff</strong> / staff123</div>
    </div>
  </div>
</div>
{% endblock %}
