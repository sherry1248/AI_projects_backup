model:
  architecture: game_screen_cnn
  num_classes: 11
  pretrained_backbone: imagenet
  input_size: [224, 224]

training:
  epochs: 50
  batch_size: 64
  learning_rate_head: 0.001
  learning_rate_full: 0.0001
  weight_decay: 0.01
  label_smoothing: 0.1
  freeze_backbone_epochs: 5
  early_stopping_patience: 10

data:
  min_samples_per_class: 100
  validation_split: 0.15
  augmentation:
    random_crop_scale: [0.8, 1.0]
    brightness_jitter: 0.2
    contrast_jitter: 0.2
    hflip_prob: 0.3

export:
  format: onnx
  opset: 17
  dynamic_batch: true
  fp16: true
