[plugin]
name = "MCP Adapter"
type = "adapter"
description = "MCP (Model Context Protocol) Router - Connect to MCP servers and expose their tools as NEKO entries"
short_description = "Connect to MCP servers and expose their tools as NEKO plugin entries. Gateway mode for external tool integration."
keywords = [
    "mcp",
    "MCP",
    "tool",
    "server",
    "gateway",
    "adapter",
    "protocol",
]
version = "0.1.0"
id = "mcp_adapter"
entry = "plugin.plugins.mcp_adapter:MCPAdapterPlugin"

[plugin.author]
name = "NEKO Team"

[plugin.i18n]
default_locale = "en"
locales_dir = "i18n"

[plugin.sdk]
recommended = ">=0.1.0,<0.2.0"
supported = ">=0.1.0,<0.3.0"

[plugin.ui]
enabled = true
panel = [
    { title = "MCP Adapter", entry = "ui/panel.tsx", context = "dashboard" },
]

[[plugin.ui.guide]]
title = "MCP Adapter Quickstart"
entry = "docs/quickstart.tsx"
permissions = [
    "state:read",
]

[plugin_runtime]
enabled = true
auto_start = true

[plugin_state]
backend = "file"
persist_mode = "auto"

[mcp_servers]

[adapter]
mode = "gateway"
priority = 0

[mcp_adapter]
connect_timeout = 30
tool_timeout = 60
auto_reconnect = true
reconnect_interval = 5
max_reconnect_attempts = 3
