[plugin]
id = "game_agent_minecraft"
name = "Minecraft 游戏插件"
description = "桥接本地 mc-agent，可查询游戏状态、查询库存、热更配置。"
short_description = "Minecraft autonomous gameplay with voice commentary."
keywords = ["minecraft", "game", "autonomous"]
version = "0.1.0"
entry = "plugin.plugins.game_agent_minecraft:GameAgentMinecraftPlugin"

[plugin.author]
name = "N.E.K.O Team"

[plugin.sdk]
recommended = ">=0.1.0,<0.2.0"
supported = ">=0.1.0,<0.3.0"

[plugin.i18n]
default_locale = "zh-CN"
locales_dir = "i18n"

[plugin_runtime]
enabled = true
# 手动启动，避免用户插件开启时默认拉起 Minecraft 代理。
auto_start = false

[plugin.store]
enabled = true

[game_agent]
# WebSocket URI of the local Minecraft agent server. Must speak the JSON
# protocol documented in this plugin's README (task / log / screenshot /
# task_finished frames).
ws_url = "ws://localhost:48909"

# Reconnect interval if the WebSocket drops.
reconnect_interval_seconds = 5.0

# Per-call upper bound on the detached task wait for ``task_finished``.
# Fire-and-forget mode means the dialog LLM never blocks on this — the
# value only controls how long the service waits before emitting a
# "timed out" cue. Set very generously (120s) because compound mc-agent
# chat-loops (craft-then-place-then-recover-from-missing-prereq) are
# observed to legitimately take 60–90s. Premature timeouts cause two
# downstream pains: (1) plugin clears _pending → next task overwrites
# mc-agent's currentTaskId → eventual real completion echoes wrong id;
# (2) dialog LLM sees a "timeout" cue and decides to re-dispatch the
# same task, producing the appearance that the action stalled even
# though mc-agent was actually still working on it.
task_timeout_seconds = 120.0

# How often the autonomous loop nudges the LLM with the latest game state
# when there's no pending task. The LLM sees a "GAME_SYSTEM" prompt with
# accumulated logs and is asked to either issue the next minecraft_task or
# provide voice commentary.
system_prompt_interval_seconds = 5.0

# Skip a system-prompt nudge if a tool call is already pending — the LLM is
# busy and an extra prompt would just queue up.
skip_system_prompt_if_busy = true

# Forward screenshots received from the agent server into the realtime LLM
# session via push_message v2 (visibility=[], ai_behavior="read"). When
# false, screenshots are still cached locally for the periodic system-prompt
# burst but not streamed in real time.
stream_screenshots_to_llm = true

# Cap on the in-memory screenshot ring buffer (most recent N frames are
# kept; older ones drop). Used by the system-prompt burst to send a brief
# visual summary alongside the textual nudge.
screenshot_cache_size = 3

# Each frame is downscaled (longest edge clamped to this many pixels) and
# re-encoded as JPEG before being pushed, so it stays under the message_plane
# payload cap (NEKO_MESSAGE_PLANE_PAYLOAD_MAX_BYTES, default 256KB). mc-agent
# broadcasts full-resolution frames; left untouched a single frame can be
# 1.5-4MB and gets silently dropped at ingest (the dialog LLM then never sees
# a fresh frame). A vision model needs neither 4MP nor lossless. Set to 0 to
# disable resizing (still re-encodes to JPEG).
screenshot_max_edge_px = 1024

# JPEG quality (1-95) for the re-encoded frame. 80 is a good size/clarity
# tradeoff for a vision model; raise toward 90 for crisper text in-frame.
screenshot_jpeg_quality = 80

# Hard budget (bytes) on the raw re-encoded JPEG. Resolution + quality caps
# alone don't guarantee a fit: the wire payload base64-encodes the frame
# (+~33%) AND carries a raw copy, so the packed payload is ~2.3x the raw JPEG
# plus envelope. If the first encode exceeds this, quality (then edge) steps
# down until it fits. 100KB raw → ~238KB < the 256KB message_plane cap. Set 0
# to disable the byte budget (resolution/quality caps still apply).
screenshot_max_bytes = 102400

[plugin.ui]
enabled = true

[[plugin.ui.guide]]
id = "quickstart"
title = "快速开始"
entry = "surfaces/quickstart.tsx"
# context 指向 @ui.context(id="quickstart") provider；缺了它 host 的
# get_ui_context 会报 "UI context not found"，api.call 拿不到 action 列表必败。
context = "quickstart"
# action:call 授权该 surface 通过 props.api.call 调用插件 entry（这里是
# game_agent_status，必须同时在 __init__.py 用 @ui.action 暴露成 UI action）。
# 没有它，hosted-surface action 路由会以 PLUGIN_UI_ACTION_FORBIDDEN 拒绝。
permissions = ["state:read", "action:call"]
